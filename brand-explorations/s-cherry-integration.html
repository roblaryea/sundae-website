<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link href="https://api.fontshare.com/v2/css?f[]=clash-display@600,700&f[]=general-sans@500,600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500&display=swap" rel="stylesheet">
<style>
  :root{--deep:#15110D;--cream:#F6F1E8}
  body{margin:0;background:var(--deep);color:#FBF8F4;font-family:'General Sans',sans-serif;padding:44px}
  h1{font-family:'Fraunces',serif;font-weight:500;font-size:24px;margin:0 0 6px}
  .sub{color:rgba(251,248,244,.5);font-size:13px;margin-bottom:30px;max-width:70ch}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
  .card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:18px;padding:26px;text-align:center}
  .lbl{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#FF5C4D;font-weight:600;margin-bottom:16px}
  .big{height:200px;display:flex;align-items:center;justify-content:center}
  .favs{display:flex;gap:16px;align-items:flex-end;justify-content:center;margin-top:18px;padding-top:16px;border-top:1px solid rgba(255,255,255,.07)}
  .favs .s{font-size:10px;color:rgba(251,248,244,.4);margin-top:6px}
  .desc{font-size:12.5px;color:rgba(251,248,244,.55);margin-top:14px;line-height:1.5}
  @keyframes drawStem{from{stroke-dashoffset:60}to{stroke-dashoffset:0}}
  @keyframes popBerry{0%{transform:scale(0);opacity:0}70%{transform:scale(1.12)}100%{transform:scale(1);opacity:1}}
  .anim .stem{stroke-dasharray:60;animation:drawStem .6s ease .3s forwards}
  .anim .berry{transform-box:fill-box;transform-origin:center;opacity:0;animation:popBerry .5s cubic-bezier(.16,1,.3,1) .8s forwards}
</style></head><body>
<h1>Cherry × S — integration study</h1>
<div class="sub">The cherry should <b>finish the letter</b>, not sit on top. Each shown on the tile at 180px + favicon 28/18px. Card F animates (stem draws, berry pops).</div>
<div class="grid" id="root"></div>
<script>
const BANDS=`<rect y="0" width="200" height="30" fill="#F6C66B"/><rect y="30" width="200" height="32" fill="#E9A24A"/><rect y="62" width="200" height="32" fill="#F7A088"/><rect y="94" width="200" height="34" fill="#FF5C4D"/><rect y="128" width="200" height="36" fill="#E03E48"/><rect y="164" width="200" height="40" fill="#B23A1E"/>`;
const SHEEN=`<linearGradient id="SH" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="rgba(255,255,255,.22)"/><stop offset=".42" stop-color="rgba(255,255,255,0)"/></linearGradient>`;

// font S (cream) as text
function fontS(){return `<text x="100" y="142" font-family="'Clash Display',sans-serif" font-weight="700" font-size="150" fill="#F8F3EA" text-anchor="middle" filter="url(#DS)">S</text>`;}
// custom drawn S stroke (cream) — lets the stroke flow into the cherry
function drawnS(){return `<path d="M140,62 C140,42 72,40 72,74 C72,102 140,104 140,138 C140,170 74,172 70,150" fill="none" stroke="#F8F3EA" stroke-width="30" stroke-linecap="round" filter="url(#DS)"/>`;}

function tile(inner, px, cls){return `<svg width="${px}" height="${px}" viewBox="0 0 200 200" class="${cls||''}" style="overflow:visible;vertical-align:middle">
  <defs><clipPath id="TC"><rect width="200" height="200" rx="45"/></clipPath>
  <radialGradient id="CG" cx="0.35" cy="0.3" r="0.85"><stop offset="0" stop-color="#FF6E5E"/><stop offset="1" stop-color="#D8313C"/></radialGradient>
  ${SHEEN}<filter id="DS" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#3a0f08" flood-opacity="0.4"/></filter></defs>
  <g clip-path="url(#TC)">${BANDS}<rect width="200" height="200" fill="url(#SH)"/>${inner}</g></svg>`;}

// cherry pieces (positioned for each concept)
const berry = (cx,cy,r)=>`<circle class="berry" cx="${cx}" cy="${cy}" r="${r}" fill="url(#CG)"/><ellipse cx="${cx-r*0.35}" cy="${cy-r*0.4}" rx="${r*0.3}" ry="${r*0.2}" fill="rgba(255,255,255,.5)"/>`;
const stem = (d)=>`<path class="stem" d="${d}" stroke="#7d1f12" stroke-width="5" fill="none" stroke-linecap="round"/>`;

const cards = [
  {lbl:'A · badge (the current one)', inner: fontS()+`<g transform="translate(150,28)">${stem('M0 18 C0 8 6 4 12 -4')}${berry(-6,24,16)}</g>`,
   desc:'Cherry parked in the corner — reads as a notification badge, detached from the letter. This is what feels off.'},
  {lbl:'B · berry caps the S terminal', inner: drawnS()+stem('M140,62 C146,46 156,42 164,32')+berry(140,62,19),
   desc:'Custom-drawn S whose top terminal flows INTO the berry; the stem grows out of it. The cherry finishes the stroke — part of the letter.'},
  {lbl:'C · stem from terminal → floating berry', inner: drawnS()+stem('M140,60 C150,40 168,40 176,22')+berry(180,18,15),
   desc:'The S’s stroke extends into a longer stem with the berry lifted above-right. More “cherry on top”, still connected.'},
  {lbl:'D · berry nestled in the counter', inner: fontS()+stem('M120,66 C122,56 128,52 134,46')+berry(116,70,15),
   desc:'Cherry tucked into the S’s upper opening. Contained, but can read as a dot-in-a-hole.'},
  {lbl:'E · clean S · cherry as separate particle', inner: drawnS(),
   desc:'No cherry on the mark at all — S is clean; the cherry lives only as the standalone particle (favicon alt, accents, wordmark period).'},
  {lbl:'F · B, animated (stem draws · berry pops)', inner: drawnS()+stem('M140,62 C146,46 156,42 164,32')+berry(140,62,19), anim:true,
   desc:'Concept B with motion — the S draws, then the cherry’s stem grows and the berry pops on. Animation makes the “finish” feel intentional.'},
];
const root=document.getElementById('root');
cards.forEach(c=>{
  root.insertAdjacentHTML('beforeend', `<div class="card"><div class="lbl">${c.lbl}</div>
    <div class="big">${tile(c.inner,170,c.anim?'anim':'')}</div>
    <div class="favs"><div><div>${tile(c.inner,28)}</div><div class="s">28px</div></div><div><div>${tile(c.inner,18)}</div><div class="s">18px</div></div></div>
    <div class="desc">${c.desc}</div></div>`);
});
</script>
</body></html>
