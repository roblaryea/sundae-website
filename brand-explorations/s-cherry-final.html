<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500&display=swap" rel="stylesheet">
<link href="https://api.fontshare.com/v2/css?f[]=general-sans@500,600&display=swap" rel="stylesheet">
<style>
  :root{--cream:#F6F1E8}
  body{margin:0;background:#15110D;color:#FBF8F4;font-family:'General Sans',sans-serif;padding:46px}
  h1{font-family:'Fraunces',serif;font-weight:500;font-size:24px;margin:0 0 26px}
  .row{display:flex;gap:36px;align-items:flex-start;flex-wrap:wrap}
  .card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:18px;padding:30px;text-align:center}
  .lbl{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#FF5C4D;font-weight:600;margin-bottom:18px}
  .onlight{background:var(--cream);border-radius:16px;padding:18px;display:inline-block;margin-top:16px}
  .favs{display:flex;gap:18px;align-items:flex-end;justify-content:center;margin-top:20px;padding-top:16px;border-top:1px solid rgba(255,255,255,.07)}
  .favs .s{font-size:10px;color:rgba(251,248,244,.4);margin-top:6px}
  .lock{display:flex;align-items:center;gap:16px}
  .wm{font-family:'Fraunces',serif;font-weight:500;font-size:48px;letter-spacing:-.03em}
  @keyframes drawStem{from{stroke-dashoffset:70}to{stroke-dashoffset:0}}
  @keyframes popBerry{0%{transform:scale(0)}68%{transform:scale(1.14)}100%{transform:scale(1)}}
  @keyframes drawS{from{stroke-dashoffset:560}to{stroke-dashoffset:0}}
  .anim .sPath{stroke-dasharray:560;animation:drawS 1s cubic-bezier(.16,1,.3,1) forwards}
  .anim .stem{stroke-dasharray:70;stroke-dashoffset:70;animation:drawStem .5s ease .9s forwards}
  .anim .berry{transform-box:fill-box;transform-origin:center;transform:scale(0);animation:popBerry .5s cubic-bezier(.16,1,.3,1) 1.25s forwards}
</style></head><body>
<h1>Cherry finishes the S — final (concept B, refined)</h1>
<div class="row" id="root"></div>
<script>
const S_PATH="M140,60 C140,40 72,39 72,74 C72,103 140,104 140,139 C140,171 74,172 69,149";
const berry=(cx,cy,r)=>`<circle class="berry" cx="${cx}" cy="${cy}" r="${r}" fill="url(#CG)"/><ellipse cx="${cx-r*0.34}" cy="${cy-r*0.4}" rx="${r*0.3}" ry="${r*0.2}" fill="rgba(255,255,255,.5)"/>`;
const stem=`<path class="stem" d="M140,44 C145,30 154,26 161,17" stroke="#7d1f12" stroke-width="5" fill="none" stroke-linecap="round"/>`;

// tile: bands + cream S (stroke) capped by cherry
function tile(px,anim){return `<svg width="${px}" height="${px}" viewBox="0 0 200 200" class="${anim?'anim':''}" style="overflow:visible;vertical-align:middle">
  <defs><clipPath id="TC"><rect width="200" height="200" rx="45"/></clipPath>
  <radialGradient id="CG" cx="0.35" cy="0.3" r="0.85"><stop offset="0" stop-color="#FF6E5E"/><stop offset="1" stop-color="#D8313C"/></radialGradient>
  <linearGradient id="SH" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="rgba(255,255,255,.22)"/><stop offset=".42" stop-color="rgba(255,255,255,0)"/></linearGradient>
  <filter id="DS" x="-40%" y="-40%" width="180%" height="180%"><feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#3a0f08" flood-opacity="0.4"/></filter></defs>
  <g clip-path="url(#TC)">
    <rect y="0" width="200" height="30" fill="#F6C66B"/><rect y="30" width="200" height="32" fill="#E9A24A"/><rect y="62" width="200" height="32" fill="#F7A088"/><rect y="94" width="200" height="34" fill="#FF5C4D"/><rect y="128" width="200" height="36" fill="#E03E48"/><rect y="164" width="200" height="40" fill="#B23A1E"/>
    <rect width="200" height="200" fill="url(#SH)"/>
    <path class="sPath" d="${S_PATH}" fill="none" stroke="#F8F3EA" stroke-width="30" stroke-linecap="round" filter="url(#DS)"/>
    ${stem}${berry(140,60,18)}
  </g></svg>`;}

// standalone: S stroke filled with strata gradient + cherry (mono/transparent)
function standaloneS(px,anim){return `<svg width="${px}" viewBox="0 0 210 200" class="${anim?'anim':''}" fill="none" style="overflow:visible;vertical-align:middle">
  <defs><linearGradient id="ST" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F6C66B"/><stop offset=".3" stop-color="#E9A24A"/><stop offset=".55" stop-color="#FF5C4D"/><stop offset=".8" stop-color="#E03E48"/><stop offset="1" stop-color="#B23A1E"/></linearGradient>
  <radialGradient id="CG" cx="0.35" cy="0.3" r="0.85"><stop offset="0" stop-color="#FF6E5E"/><stop offset="1" stop-color="#D8313C"/></radialGradient></defs>
  <path class="sPath" d="${S_PATH}" fill="none" stroke="url(#ST)" stroke-width="30" stroke-linecap="round"/>
  ${stem}${berry(140,60,18)}</svg>`;}

document.getElementById('root').innerHTML = `
  <div class="card"><div class="lbl">Primary tile · the mark</div>
    <div>${tile(180)}</div>
    <div class="onlight">${tile(118)}</div>
    <div class="favs"><div><div>${tile(40)}</div><div class="s">40</div></div><div><div>${tile(28)}</div><div class="s">28</div></div><div><div>${tile(18)}</div><div class="s">18 favicon</div></div></div>
  </div>
  <div class="card"><div class="lbl">Standalone S · gradient stroke</div>
    <div style="height:200px;display:flex;align-items:center;justify-content:center">${standaloneS(150)}</div>
    <div class="onlight">${standaloneS(110)}</div>
  </div>
  <div class="card"><div class="lbl">Animated · S draws → cherry finishes</div>
    <div style="height:200px;display:flex;align-items:center;justify-content:center" id="animstage">${tile(170,true)}</div>
    <button onclick="document.getElementById('animstage').innerHTML='';setTimeout(()=>document.getElementById('animstage').innerHTML=\`${tile(170,true).replace(/`/g,'')}\`,30)" style="margin-top:14px;background:#E03E48;border:0;color:#fff;padding:9px 16px;border-radius:8px;font:inherit;font-weight:600;cursor:pointer">Replay</button>
  </div>
  <div class="card" style="text-align:left"><div class="lbl">Lockup</div>
    <div class="lock">${tile(70)}<span class="wm">sundae</span></div>
    <div class="onlight" style="display:block;margin-top:20px"><div class="lock">${tile(54)}<span class="wm" style="font-size:38px;color:#1a120c">sundae</span></div></div>
  </div>`;
</script>
</body></html>
