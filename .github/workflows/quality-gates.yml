name: Quality Gates

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop]

jobs:
  quality:
    name: Lint, Blog QA, Page QA & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm audit --audit-level=high

      - name: Lint
        run: npm run lint

      - name: Blog copy QA
        run: npm run qa:blog-copy

      - name: Page copy QA
        run: npm run qa:page-copy

      - name: Build
        run: npm run build
