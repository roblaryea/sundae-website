<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sundae — Design Review · V1 vs V2</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }
  body { font-family: 'Hanken Grotesk', system-ui, sans-serif; background: #06090D; color: #FDFBF7; display: flex; flex-direction: column; }

  header.top { flex: 0 0 auto; display: flex; align-items: center; gap: 16px; padding: 12px 22px; border-bottom: 1px solid rgba(255,255,255,0.08); background: #090D13; }
  header.top h1 { font-size: 15px; font-weight: 700; letter-spacing: -0.01em; }
  header.top .sub { font-size: 12.5px; color: rgba(253,251,247,0.5); }
  header.top .hint { margin-left: auto; font-size: 12px; color: rgba(253,251,247,0.45); display: inline-flex; align-items: center; gap: 8px; }
  header.top .hint kbd { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12); border-radius: 5px; padding: 1px 6px; font-size: 11px; font-family: inherit; }

  .cols { flex: 1 1 auto; display: flex; min-height: 0; }
  .col { flex: 1 1 50%; display: flex; flex-direction: column; min-width: 0; }
  .col + .col { border-left: 1px solid rgba(255,255,255,0.1); }

  .label { flex: 0 0 auto; display: flex; align-items: center; gap: 11px; padding: 11px 18px; background: #0B0F15; border-bottom: 1px solid rgba(255,255,255,0.07); }
  .label .tag { font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; padding: 4px 10px; border-radius: 999px; }
  .label .v1 { background: rgba(255,92,77,0.16); color: #FF8473; border: 1px solid rgba(255,92,77,0.3); }
  .label .v2 { background: rgba(233,162,74,0.16); color: #F2BE78; border: 1px solid rgba(233,162,74,0.32); }
  .label .name { font-size: 13.5px; font-weight: 600; }
  .label .desc { font-size: 12px; color: rgba(253,251,247,0.45); }
  @media (max-width: 900px) { .label .desc { display: none; } }

  .frame { flex: 1 1 auto; min-height: 0; position: relative; background: #0B1117; }
  iframe { width: 100%; height: 100%; border: 0; display: block; }
</style>
</head>
<body>
  <header class="top">
    <h1>Sundae · Design Review</h1>
    <span class="sub">Warm-Signature pilot — two takes, same structure &amp; copy, purely look &amp; feel</span>
    <span class="hint"><kbd>scroll each panel independently</kbd> ↔</span>
  </header>
  <div class="cols">
    <div class="col">
      <div class="label">
        <span class="tag v1">V1</span>
        <span class="name">Vivid Coral</span>
        <span class="desc">— centered, product-forward, no photography</span>
      </div>
      <div class="frame"><iframe src="./warm-signature.html" title="V1"></iframe></div>
    </div>
    <div class="col">
      <div class="label">
        <span class="tag v2">V2</span>
        <span class="name">Editorial Warm</span>
        <span class="desc">— photography-led, caramel-warm, premium</span>
      </div>
      <div class="frame"><iframe src="./warm-signature-v2.html" title="V2"></iframe></div>
    </div>
  </div>
</body>
</html>
